apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: laboratory-swarm
type: Opaque
stringData:
  # Set these values from a secure source before deployment.
  POSTGRES_USER: "CHANGEME_POSTGRES_USER"
  POSTGRES_PASSWORD: "CHANGEME_POSTGRES_PASSWORD"
  POSTGRES_DB_URL: "CHANGEME_POSTGRES_DB_URL"
